{% extends 'base.html' %}
{% block content %}

<nav>
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="/">Home</a></li>
<li class="breadcrumb-item active">Hapus</li>
</ol>
</nav>

<div class="page-shell page-shell-two">
<div class="card shadow">
<div class="card-body p-4 p-lg-5">

<h2 class="mb-3">Hapus Laporan</h2>
<p class="section-intro">
Apakah Anda yakin ingin menghapus laporan <strong>"{{ object.title }}"</strong>? Tindakan ini tidak dapat dibatalkan.
</p>

<form method="POST">
{% csrf_token %}

<button id="submitBtn" type="submit" class="btn btn-danger">Ya, Hapus</button>
<a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>

</form>

</div>
</div>
</div>

{% endblock %}
