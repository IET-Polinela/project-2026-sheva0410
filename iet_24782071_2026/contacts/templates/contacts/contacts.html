<!DOCTYPE html>
<html>
<head>
    <title>Contacts</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(135deg, #4facfe, #6a11cb);
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            color: white;
        }

        .navbar h2 {
            display: inline;
            margin: 0;
        }

        .navbar a {
            float: right;
            color: white;
            text-decoration: none;
            background: #007BFF;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .info {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Smart City</h2>
    <a href="/">Home</a>
</div>

<div class="container">
    <div class="card">
        <h1>Contact Us</h1>

        <div class="info">
            <p><b>Email:</b><br> lampungcityreport@gmail.com</p>
        </div>

        <div class="info">
            <p><b>Telepon:</b><br> 082132597863</p>
        </div>
    </div>
</div>

</body>
</html>
