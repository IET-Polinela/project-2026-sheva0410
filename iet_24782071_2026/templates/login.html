{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="text-center mb-4">Login</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        {{ form.password }}
                    </div>

                    <button class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
