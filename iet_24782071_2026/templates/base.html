<!DOCTYPE html>
<html>
<head>
    <title>Smart City</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Smart City</a>

        <div>
            <a class="btn btn-outline-light btn-sm" href="/">Home</a>
            <a class="btn btn-outline-light btn-sm" href="/create/">Reports</a>
            <a class="btn btn-outline-light btn-sm" href="/about/">About</a>
            <a class="btn btn-outline-light btn-sm" href="/contacts/">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- 🔥 DJANGO MESSAGE ALERT -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
