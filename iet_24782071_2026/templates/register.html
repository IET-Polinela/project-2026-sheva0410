{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="text-center mb-4">Register</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-success w-100">
                        Register
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
