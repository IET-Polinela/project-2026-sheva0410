<!DOCTYPE html>
<html>
<head>
    <title>Edit Laporan</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #4facfe, #6a11cb);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 15px;
            color: white;
            backdrop-filter: blur(10px);
        }

        .navbar h2 {
            margin: 0;
            display: inline;
        }

        .navbar a {
            float: right;
            color: white;
            text-decoration: none;
            background: #007BFF;
            padding: 8px 12px;
            border-radius: 5px;
        }

        /* FORM CONTAINER */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .form-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        form p {
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            color: black;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #e69500;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Smart City</h2>
        <a href="/">Kembali</a>
    </div>

    <!-- FORM -->
    <div class="container">
        <div class="form-card">
            <h2>Edit Laporan</h2>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Update</button>
            </form>
        </div>
    </div>

</body>
</html>
