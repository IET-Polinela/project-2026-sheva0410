<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.35), transparent 30%),
                linear-gradient(135deg, #12091f, #24113a, #0f0718);
            color: #f8f9fa;
        }

        .navbar-custom {
            background: linear-gradient(90deg, #4c1d95, #7c3aed, #8b5cf6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .spa-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8f9fa;
            backdrop-filter: blur(10px);
        }

        .hero-card {
            background: linear-gradient(135deg, #3b1b63, #6d28d9, #a78bfa);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .btn-purple {
            background: #8b5cf6;
            color: white;
            border: none;
        }

        .btn-purple:hover {
            background: #7c3aed;
            color: white;
        }

        .form-control,
        .form-select {
            background-color: rgba(255, 255, 255, 0.9);
        }

        .text-soft {
            color: rgba(255, 255, 255, 0.75);
        }

        .modal-content {
            background: #24113a;
            color: #f8f9fa;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .modal-header,
        .modal-footer {
            border-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
        <div class="container px-4">

            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>
                Smart City
            </a>

            <div id="nav-menu" class="ms-auto"></div>

        </div>
    </nav>

    <main class="container px-4 mt-4 spa-container" id="app-content"></main>


    <!-- REPORT MODAL -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content rounded-4">

                <div class="modal-header">

                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>
                        Buat Laporan Baru
                    </h5>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>

                </div>

                <div class="modal-body">

                    <form id="reportForm">

                        <div class="mb-3">
                            <label for="reportTitle" class="form-label">Judul Laporan</label>
                            <input type="text" id="reportTitle" class="form-control" placeholder="Contoh: Jalan Rusak"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory" class="form-label">Kategori</label>
                            <select id="reportCategory" class="form-select" required>
                                <option value="">Pilih kategori</option>
                                <option value="Jalan Rusak">Jalan Rusak</option>
                                <option value="Lampu Jalan">Lampu Jalan</option>
                                <option value="Sampah">Sampah</option>
                                <option value="Drainase">Drainase</option>
                                <option value="Keamanan">Keamanan</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="reportDescription" class="form-label">Deskripsi</label>
                            <textarea id="reportDescription" class="form-control" rows="4"
                                placeholder="Tuliskan detail masalah..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation" class="form-label">Lokasi</label>
                            <input type="text" id="reportLocation" class="form-control"
                                placeholder="Contoh: Bandar Lampung" required>
                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">
                        Batal
                    </button>

                    <button type="button" class="btn btn-secondary" id="saveDraftBtn">
                        <i class="bi bi-save me-1"></i>
                        Simpan Draft
                    </button>

                    <button type="button" class="btn btn-purple" id="submitReportBtn">
                        <i class="bi bi-send-fill me-1"></i>
                        Ajukan
                    </button>

                </div>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

</body>

</html>
